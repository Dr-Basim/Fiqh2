  if(h>0)return h+'س '+m+'د '+s+'ث';

};

const NAWAZIL_EVAL_SYS=`أنت مصحح فقهي. صحِّح إجابة الطالب من هذا المحتوى فقط (3-4 جمل):
الرهن: جعل عين وثيقة بدين لا يضمنه المرتهن إلا بتعدٍّ.
السلم: بيع موصوف في الذمة بثمن معجل، شروطه: ضبط المسلَم، قبض الثمن في المجلس، وجوده عند الأجل.
الحوالة: نقل الدين، شروطها رضا المحيل واتفاق المالين.
الوكالة: تفويض في النيابة، لا تصح في الطهارة والصلاة، الوكيل أمين.
الكفالة: التزام الإحضار، أركانها خمسة. الضمان: التزام دين الغير، لا عوض عليه.
الحجر: منع التصرف؛ لمصلحة المحجور أو غيره. رفعه عن الصغير بالبلوغ والرشد.`;

function TopicSlide({topic,idx,onComplete}){
  const [actIdx,setActIdx]=useState(0);
  const [sel,setSel]=useState(null);
  const [showRetry,setShowRetry]=useState(false);
  const Ct=TOPIC_CONTENTS[idx];
  const curAct=topic.acts[actIdx];

  function handleOpt(i){
    if(sel!==null)return;
    setSel(i);
    const ok=i===curAct.ans;
    if(ok){
      setShowRetry(false);
      setTimeout(()=>{
        const next=actIdx+1;
        if(next<topic.acts.length){setActIdx(next);setSel(null);}
        else{setTimeout(()=>onComplete(),300);}
      },900);
    }else{setShowRetry(true);}
  }

  return(
    <div>
      <div className="card" style={{background:topic.bg}}>
        <h2>{topic.icon} {topic.title}</h2>
        {React.createElement(Ct)}
      </div>
      {curAct&&(
        <div>
          <div className="aq">{'? '+curAct.q}</div>
          <div className="ao">
            {curAct.opts.map((o,i)=>{
              let c='aopt';
              if(sel!==null){
                if(i===curAct.ans)c+=' sa';
                else if(i===sel&&sel!==curAct.ans)c+=' wrg';
              }
              return <div key={i} className={c} onClick={()=>handleOpt(i)}>{o}</div>;
            })}
          </div>
          {showRetry&&<button className="btn-rt" onClick={()=>{setSel(null);setShowRetry(false);}}>حاول مرة أخرى</button>}
        </div>
      )}
    </div>
  );
}

function Lesson({onFinish}){

  if(allDone){

        <button className="btn btn-g" onClick={onFinish}>انتقل إلى الخرائط الذهنية</button>
      </div>
    );
  }

  return(
    <div>
      <div className="prog">
        {TOPICS.map((t,i)=>(
          <div key={i} className={'dot'+(i<ti?' dn':i===ti?' cu':'')}>{i+1}</div>

function MindMaps({mmStart,onReady}){
  const [elapsed,setElapsed]=useState(0);
  const REQ=120;
  useEffect(()=>{
    const iv=setInterval(()=>{
      const e=Math.floor((Date.now()-mmStart)/1000);
      setElapsed(e);
      if(e>=REQ)clearInterval(iv);
    },1000);
    return()=>clearInterval(iv);
  },[mmStart]);
  const rem=Math.max(0,REQ-elapsed);
  const unlocked=elapsed>=REQ;

  return(
    <div>
      {!unlocked
        ? <div className="timer">{'⏱ تبقى '+rem+' ثانية قبل فتح المراجعة'}</div>
        : <div className="unlock">
            <p style={{fontWeight:700,color:'var(--green)',marginBottom:8}}>راجعت الخرائط الذهنية!</p>
            <button className="btn btn-g" onClick={onReady}>انتقل إلى المراجعة الذكية</button>
          </div>
      }
      {MINDMAPS.map((mm,mi)=>(
        <div key={mi} style={{marginBottom:14}}>
          <div className="mm-title">{mm.title}</div>
          <div className="mm-c">{mm.center}</div>
          <div className="mm-gr">
            {mm.branches.map((b,bi)=>(
              <div key={bi} className="mm-br">
                <h4>{b.title}</h4>
                <p>{b.text}</p>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function Nawazil(){
  const [ans,setAns]=useState({});
  const [res,setRes]=useState({});
  const [ld,setLd]=useState({});
  const apiKey=getConf('apiKey');

  async function evaluate(i){
    const a=ans[i]||'';
    if(!a.trim())return;
    if(!apiKey){setRes(p=>({...p,[i]:'أدخل مفتاح API في لوحة التحكم (رمز: 1234)'}));return;}
    setLd(p=>({...p,[i]:true}));
    try{
      const nw=NAWAZIL[i];
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:300,system:NAWAZIL_EVAL_SYS,messages:[{role:'user',content:'النازلة: '+nw.q+'\nالسؤال: '+nw.s+'\nإجابة الطالب: '+a}]})
      });
      const d=await r.json();
      setRes(p=>({...p,[i]:d.content?.[0]?.text||'لا استجابة'}));
    }catch{setRes(p=>({...p,[i]:'خطأ في الاتصال. تحقق من مفتاح API.'}));}
    setLd(p=>({...p,[i]:false}));
  }

  return(
    <div>
      {!apiKey&&<div className="api-note">للحصول على تصحيح فوري، أدخل مفتاح Claude API في لوحة التحكم (رمز: 1234)</div>}
      {NAWAZIL.map((nw,i)=>(
        <div key={i} className="nw-cd">
          <div className="nw-tp">{nw.topic}</div>
          <div className="nw-q">{nw.q}</div>
          <div className="nw-s">{'السؤال: '+nw.s}</div>
          <textarea className="nw-in" placeholder="اكتب إجابتك هنا..." value={ans[i]||''} onChange={e=>setAns(p=>({...p,[i]:e.target.value}))} rows={3}/>
          <button className="btn-ev" disabled={ld[i]||!(ans[i]||'').trim()} onClick={()=>evaluate(i)}>
            {ld[i]?'جارٍ التصحيح...':'صحِّح إجابتي'}
          </button>
          {res[i]&&<div className="nw-rs">{res[i]}</div>}
        </div>
      ))}
    </div>
  );
}

function Quiz({stu,loginTime}){
  const [qi,setQi]=useState(0);
  const [sc,setSc]=useState(0);
  const [done,setDone]=useState(false);
  const [sel,setSel]=useState(null);
  const [dur,setDur]=useState('');

  function handleAns(i){
    if(sel!==null)return;
    setSel(i);
    const correct=i===QUIZ[qi].a;
    const newSc=correct?sc+1:sc;
    if(correct)setSc(newSc);
    setTimeout(()=>{
      if(qi+1<QUIZ.length){setQi(qi+1);setSel(null);}
      else{
        const el=loginTime?Date.now()-loginTime:0;
        const ds=fmtDur(el);
        setDur(ds);
        setDone(true);
        saveRec({name:stu.n,sec:stu.s,score:newSc,dur:ds,date:new Date().toLocaleDateString('ar-SA'),ts:Date.now()});
        const u=getConf('gsURL');
        if(u){try{fetch(u+'?name='+encodeURIComponent(stu.n)+'&section='+encodeURIComponent(stu.s)+'&score='+newSc+'/20&duration='+encodeURIComponent(ds),{mode:'no-cors'});}catch(e){}}
      }
    },850);
  }

  if(done){
    const pct=Math.round((sc/QUIZ.length)*100);
    return(
      <div className="qz-dn">
        <div style={{fontSize:'2.5rem',marginBottom:8}}>{'🎓'}</div>
        <div className="qz-sc">{sc+'/'+QUIZ.length}</div>
        <p style={{color:'#666',marginTop:8,fontSize:'.88rem'}}>{pct>=85?'ممتاز! أداء رائع':pct>=70?'جيد جداً':pct>=60?'جيد، واصل المراجعة':'تحتاج مراجعة أكثر'}</p>
        <p style={{fontSize:'.76rem',color:'#aaa',marginTop:8}}>{stu.n+' | الشعبة: '+stu.s}</p>
        {dur&&<p style={{fontSize:'.76rem',color:'#888',marginTop:5}}>{'مدة الدراسة: '+dur}</p>}
      </div>
    );
  }

  const q=QUIZ[qi];
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:9}}>
        <span style={{fontSize:'.78rem',color:'#888'}}>{'السؤال '+(qi+1)+' من '+QUIZ.length}</span>
        <span style={{fontWeight:700,color:'var(--navy)',fontSize:'.82rem'}}>{'النقاط: '+sc}</span>
      </div>
      <div className="qp-bar"><div className="qp-fill" style={{width:(((qi+1)/QUIZ.length)*100)+'%'}}/></div>
      <div className="qz-q">{q.q}</div>
      {q.o.map((o,i)=>{
        let c='qz-op';
        if(sel!==null){if(i===q.a)c+=' cor';else if(i===sel)c+=' wrg';}
        return <div key={i} className={c} onClick={()=>handleAns(i)}>{o}</div>;
      })}
    </div>
  );
}

        {tab==='lesson'&&<Lesson onFinish={()=>{setLessonDone(true);setMmStart(Date.now());setTab('mindmap');}}/>}
        {tab==='mindmap'&&(lessonDone
          ? <MindMaps mmStart={mmStart} onReady={()=>{setMmDone(true);setRevStart(Date.now());setTab('review');}}/>
          : <div className="lock-box"><div style={{fontSize:'2rem'}}>{'🔒'}</div><p>أكمل شرائح الدرس أولاً للوصول إلى الخرائط الذهنية</p></div>
        )}
        {tab==='review'&&(mmDone
          ? <Review revStart={revStart} onReady={()=>{setRevDone(true);setTab('quiz');}}/>
          : <div className="lock-box"><div style={{fontSize:'2rem'}}>{'🔒'}</div><p>أكمل الخرائط الذهنية أولاً للوصول إلى المراجعة</p></div>
        )}
        {tab==='nawazil'&&<Nawazil/>}
        {tab==='quiz'&&(revDone
          ? <Quiz stu={stu} loginTime={loginTime}/>
          : <div className="lock-box"><div style={{fontSize:'2rem'}}>{'🔒'}</div><p>أكمل المراجعة الذكية أولاً ثم انتقل للاختبار</p></div>
        )}
      </div>

      <div className="nav">
        {NAV.map(n=>(
          <button key={n.k}
            className={'nb'+(tab===n.k?' act':'')+(canAccess(n.k)?'':' lk')}
            onClick={()=>canAccess(n.k)&&setTab(n.k)}>
            <span className="nb-ic">{n.ic}</span>{n.lbl}
          </button>
        ))}
      </div>
      {dash&&<Dashboard onClose={()=>setDash(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
